name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p artifacts
          TAG="${GITHUB_REF_NAME}"
          [ -z "$TAG" ] && TAG="dev"
          cp app/build/outputs/apk/debug/app-debug.apk "artifacts/EverythingDroid-${TAG}-debug.apk"
          ls -la artifacts

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EverythingDroid-debug-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          body: |
            Debug-signed APK built by GitHub Actions.

            Install on Android (USB):
            ```
            adb install -r EverythingDroid-${{ github.ref_name }}-debug.apk
            ```

            Or transfer the APK to your phone and open it (you'll need to allow
            "Install unknown apps" for your file manager).

            Debug-signed builds use a per-CI debug keystore, so upgrading between
            tagged releases may require uninstalling the previous version first.
